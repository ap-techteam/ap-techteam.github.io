<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AP Calculator</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Vazirmatn:wght@400;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="calculator">

<h2>AP Calculator</h2>

<input id="display" readonly>

<div class="buttons">
<button onclick="clearDisplay()">C</button>
<button onclick="deleteChar()">⌫</button>
<button onclick="add('%')">%</button>
<button onclick="add('/')">÷</button>

<button onclick="add('7')">7</button>
<button onclick="add('8')">8</button>
<button onclick="add('9')">9</button>
<button onclick="add('*')">×</button>

<button onclick="add('4')">4</button>
<button onclick="add('5')">5</button>
<button onclick="add('6')">6</button>
<button onclick="add('-')">−</button>

<button onclick="add('1')">1</button>
<button onclick="add('2')">2</button>
<button onclick="add('3')">3</button>
<button onclick="add('+')">+</button>

<button onclick="add('0')" class="zero">0</button>
<button onclick="add('.')">.</button>
<button onclick="calculate()">=</button>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
